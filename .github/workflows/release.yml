name: Release

on:
  push:
    tags:
      - 'v*'

permissions:
  contents: write
  packages: write
  id-token: write

jobs:
  test:
    runs-on: ubuntu-latest
    permissions:
      contents: read
    steps:
      - uses: actions/checkout@v4

      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version: '1.24'

      - name: Run tests
        run: go test -race -cover ./...

  build:
    runs-on: ubuntu-latest
    needs: test
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4

      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version: '1.24'

      - name: Build amd64
        run: |
          CGO_ENABLED=0 GOOS=linux GOARCH=amd64 go build -ldflags="-s -w -X main.Version=${{ github.ref_name }}" -o openmodel-linux-amd64 ./cmd
          tar -czf openmodel-linux-amd64.tar.gz openmodel-linux-amd64
      
      - name: Build arm64
        run: |
          CGO_ENABLED=0 GOOS=linux GOARCH=arm64 go build -ldflags="-s -w -X main.Version=${{ github.ref_name }}" -o openmodel-linux-arm64 ./cmd
          tar -czf openmodel-linux-arm64.tar.gz openmodel-linux-arm64
      
      - name: Create Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ github.ref_name }}
          name: Release ${{ github.ref_name }}
          draft: false
          prerelease: false
          files: |
            openmodel-linux-amd64.tar.gz
            openmodel-linux-arm64.tar.gz

  docker:
    runs-on: ubuntu-latest
    needs: test
    permissions:
      contents: read
      packages: write
    steps:
      - uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to GitHub Container Registry
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Extract version from tag
        id: version
        run: echo "VERSION=${GITHUB_REF_NAME}" >> $GITHUB_OUTPUT

      - name: Build and push Docker image
        uses: docker/build-push-action@v6
        with:
          context: .
          platforms: linux/amd64,linux/arm64
          push: true
          tags: |
            ghcr.io/${{ github.repository_owner }}/openmodel:${{ steps.version.outputs.VERSION }}
            ghcr.io/${{ github.repository_owner }}/openmodel:latest
          build-args: |
            VERSION=${{ steps.version.outputs.VERSION }}
            BUILD_DATE=${{ github.event.head_commit.timestamp }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

  sign-and-attest:
    runs-on: ubuntu-latest
    needs: docker
    permissions:
      contents: read
      id-token: write
    steps:
      - uses: actions/checkout@v4

      - name: Extract version from tag
        id: version
        run: echo "VERSION=${GITHUB_REF_NAME}" >> $GITHUB_OUTPUT

      - name: Install cosign
        uses: sigstore/cosign-installer@v3.5.0

      - name: Install syft
        uses: anchore/sbom-action/install-syft@v0.15.11

      - name: Sign Docker image
        run: |
          cosign sign \
            --yes \
            -a "https://github.com/${{ github.repository_owner }}" \
            --output signature \
            "ghcr.io/${{ github.repository_owner }}/openmodel:${{ steps.version.outputs.VERSION }}"
          cosign sign \
            --yes \
            -a "https://github.com/${{ github.repository_owner }}" \
            --output signature \
            "ghcr.io/${{ github.repository_owner }}/openmodel:latest"

      - name: Generate SBOM
        run: |
          syft ghcr.io/${{ github.repository_owner }}/openmodel:${{ steps.version.outputs.VERSION }} \
            --output spdx-json \
            --file sbom-${{ steps.version.outputs.VERSION }}.spdx.json

      - name: Upload SBOM and signatures
        uses: softprops/action-gh-release@v2
        if: startsWith(github.ref, 'refs/tags/')
        with:
          tag_name: ${{ github.ref_name }}
          files: |
            sbom-${{ steps.version.outputs.VERSION }}.spdx.json
            openmodel-${{ steps.version.outputs.VERSION }}.amd64.signature
            openmodel-${{ steps.version.outputs.VERSION }}.arm64.signature
          generate_release_notes: false
